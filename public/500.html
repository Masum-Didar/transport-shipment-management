<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Server error (500) | TSM System</title>
  <meta name="robots" content="noindex, nofollow">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0}
    html{font-size:14px;font-family:'Inter',system-ui,-apple-system,sans-serif}
    body{background:#F9FAFB;color:#111827;display:grid;place-items:center;min-height:100vh;padding:1rem}
    .card{background:#fff;border-radius:12px;border:1px solid #E5E7EB;padding:2.5rem;text-align:center;max-width:400px;width:100%;box-shadow:0 1px 3px rgba(0,0,0,.05)}
    .icon{width:56px;height:56px;background:#2563EB;border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem;font-size:1.5rem;box-shadow:0 4px 12px rgba(37,99,235,.2)}
    h1{font-size:3rem;font-weight:700;color:#EF4444;margin-bottom:.25rem}
    h2{font-size:1rem;font-weight:600;color:#111827;margin-bottom:.5rem}
    p{font-size:.875rem;color:#6B7280;margin-bottom:1.5rem;line-height:1.5}
    .btn{display:inline-block;background:#2563EB;color:#fff;font-size:.875rem;font-weight:500;padding:.625rem 1.25rem;border-radius:8px;text-decoration:none;transition:background .15s}
    .btn:hover{background:#1D4ED8}
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🔧</div>
    <h1>500</h1>
    <h2>Something went wrong</h2>
    <p>We're sorry, but something went wrong on our end. Please try again later.</p>
    <a href="/" class="btn">Go to Dashboard</a>
  </div>
</body>
</html>
