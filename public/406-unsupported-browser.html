<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Unsupported browser | TSM System</title>
  <meta name="robots" content="noindex, nofollow">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0}
    html{font-size:14px;font-family:'Inter',system-ui,-apple-system,sans-serif}
    body{background:#F9FAFB;color:#111827;display:grid;place-items:center;min-height:100vh;padding:1rem}
    .card{background:#fff;border-radius:12px;border:1px solid #E5E7EB;padding:2.5rem;text-align:center;max-width:420px;width:100%;box-shadow:0 1px 3px rgba(0,0,0,.05)}
    .icon{width:56px;height:56px;background:#2563EB;border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem;font-size:1.5rem;box-shadow:0 4px 12px rgba(37,99,235,.2)}
    h2{font-size:1rem;font-weight:600;color:#111827;margin-bottom:.5rem}
    p{font-size:.875rem;color:#6B7280;margin-bottom:1rem;line-height:1.5}
    ul{list-style:none;padding:0;margin-bottom:1.5rem}
    li{display:inline-block;margin:.25rem}
    li a{display:inline-block;background:#F3F4F6;color:#374151;font-size:.8rem;padding:.375rem .75rem;border-radius:6px;text-decoration:none;transition:background .15s}
    li a:hover{background:#E5E7EB}
    .btn{display:inline-block;background:#2563EB;color:#fff;font-size:.875rem;font-weight:500;padding:.625rem 1.25rem;border-radius:8px;text-decoration:none;transition:background .15s}
    .btn:hover{background:#1D4ED8}
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🌐</div>
    <h2>Browser not supported</h2>
    <p>Your browser is out of date and doesn't support the features required by this application. Please upgrade to a modern browser.</p>
    <ul>
      <li><a href="https://www.google.com/chrome">Chrome</a></li>
      <li><a href="https://www.mozilla.org/firefox">Firefox</a></li>
      <li><a href="https://www.apple.com/safari">Safari</a></li>
      <li><a href="https://www.microsoft.com/edge">Edge</a></li>
    </ul>
    <p class="text-xs text-gray-400">TSM System requires a browser that supports modern web standards.</p>
  </div>
</body>
</html>
